apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: invoicehub-ingress
  namespace: invoicehub-ns
spec:
  ingressClassName: nginx

  rules:
    - host: invoicehub.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5219

          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80